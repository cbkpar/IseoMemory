<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><link rel="stylesheet" href="css/style.css"></head>
<body>
<div id="boot">
	<div class="album-cover" aria-hidden="true">
		<div class="cover-photo"><img src="./assets/images/card0001.png" alt=""></div>
		<p>OUR LITTLE STORY</p>
		<div class="cover-title">Iseo<br><em>Memory</em></div>
		<span class="cover-date">2025 —</span>
	</div>
	<div class="prologue-intro">
		<p class="prologue-kicker">OUR FIRST PHOTO ALBUM</p>
		<h1>너를 기다린<br>모든 장면들</h1>
		<p class="prologue-copy">아직 만나지 못한 너를 향해<br>두 사람이 한 장씩 채워 온 사진첩</p>
		<button id="bootBtn">사진첩 펼쳐 보기 <span>→</span></button>
		<p class="prologue-note">for our little Iseo</p>
	</div>
</div>
<div id="main" style="display:none">
	<div id="album" class="album-container">
		<div class="album-header"> ISEO'S PHOTO ALBUM </div>
		<div id="album-progress" class="album-progress"></div>
		<div id="card-list" class="card-list"></div>
	</div>
	<div id="log"></div>
	<div id="progress-bar"></div>
	<div id="systemLog"></div>
	<div id="terminal"></div>
	
	
	<div id="draw-area">
		<button id="draw-button">
			<div id="draw-count"> 💗 ×1	</div>
			<div class="draw-progress">
				<div id="draw-progress-fill"></div>
			</div>
			<div id="draw-timer">
				READY
			</div>

		</button>
		<div id="draw-result"></div>
	</div>
</div>

<div id="draw-modal" class="draw-modal hidden">
    <div class="draw-modal-bg"></div>
    <div class="draw-modal-content">
        <div class="draw-header">
			<div class="draw-title">MEMORY RECOVERY</div>
        </div>
        <div id="draw-grid" class="draw-grid"></div>
        <div class="modal-footer">
            <button id="draw-close" class="draw-continue" disabled> Next </button>
        </div>
    </div>
</div>

<div id="detail-modal" class="detail-modal hidden">
    <div class="detail-modal-bg"></div>
    <div class="detail-content">
        <img id="detail-image">
        <div id="detail-title"></div>
        <div id="detail-stars"></div>
		<div id="detail-level"></div>
        <div id="detail-count"></div>
		<div id="detail-effect"></div>
        <div id="detail-date"></div>
        <div id="detail-desc"></div>
    </div>
</div>

<script src="js/App.js"></script>
<script src="js/Data.js"></script>
<script src="js/player.js"></script>
<script src="js/SaveManager.js"></script>
<script src="js/CardManager.js"></script>
<script src="js/DrawManager.js"></script>
<script src="js/Game.js"></script>
<script src="js/CardUI.js"></script>
<script src="js/UI.js"></script>
<script src="js/DrawDirector.js"></script>
<script src="js/Boot.js"></script>
<script src="js/album.js"></script>
<script src="js/main.js"></script>

</body>
</html>
